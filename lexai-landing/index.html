
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI — Record. Process. Study.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1A7A4A;
  --gl:#6ECFA0;
  --gdim:rgba(26,122,74,0.22);
  --dark:#07100B;
  --panel:#112318;
  --radius:1rem;
}
html,body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background:var(--dark);
  overflow-x:hidden;
  scroll-behavior:smooth;
  color:#fff;
}

/* ── VIDEO BG & EFFECTS ── */
.vbg{position:fixed;inset:0;z-index:0}
.vbg video{width:100%;height:100%;object-fit:cover}
.vbg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(7,16,11,0.92) 0%,rgba(7,16,11,0.7) 50%,rgba(7,16,11,0.85) 100%);
}
.glow-left{
  position:fixed;top:40%;left:20%;transform:translate(-50%,-50%);z-index:1;
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,rgba(26,122,74,0.25) 0%,transparent 65%);
  pointer-events:none;
}
.grid-bg {
  position: absolute; inset: 0; z-index: 1; opacity: 0.15; pointer-events: none;
  background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── LIQUID GLASS ── */
.lg{
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 1px 1px rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.2);
  position:relative;overflow:hidden;
}
.lgs{
  background:rgba(20,60,35,0.25);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border: 1px solid rgba(110,207,160,0.15);
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 1px rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.lgs::before {
  content:'';position:absolute;inset:0;z-index:-1;
  background: linear-gradient(180deg, rgba(110,207,160,0.05) 0%, transparent 100%);
}

/* ── ANIMATIONS ── */
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(110,207,160,0.2); } 50% { box-shadow: 0 0 30px rgba(110,207,160,0.5); } }
.stagger-1 { animation: slideUp 0.6s ease-out 0.1s both; }
.stagger-2 { animation: slideUp 0.6s ease-out 0.2s both; }
.stagger-3 { animation: slideUp 0.6s ease-out 0.3s both; }

/* ── LAYOUT ── */
.hero-wrapper { position:relative; min-height:100vh; display:flex; flex-direction:column; padding-bottom: 20px;}
.layout { position:relative; z-index:10; display:flex; flex:1; max-width:1600px; margin:0 auto; width:100%; align-items: stretch; }
.left { width:52%; display:flex; flex-direction:column; padding:20px; }
.right { width:48%; display:flex; flex-direction:column; padding:20px 24px 20px 4px; gap:14px; }

/* ── LEFT INNER PANEL ── */
.left-inner{
  border-radius:32px; display:flex; flex-direction:column; padding:24px 32px 30px; flex:1; justify-content: space-between;
}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-wm{font-size:22px;font-weight:600;color:#fff;letter-spacing:-0.05em}
.nav-pill{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:99px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.nav-pill:hover{background:rgba(255,255,255,0.1); transform:translateY(-2px);}
.nav-right-group{display:flex;align-items:center;gap:10px}
.ib{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.7);transition:all 0.2s}
.ib:hover{background:rgba(255,255,255,0.1);color:#fff; transform:scale(1.05);}

/* HERO CENTER */
.hero-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px;padding:40px 0}
