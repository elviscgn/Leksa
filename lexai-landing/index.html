
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI — Record. Process. Study.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1A7A4A;
  --gl:#6ECFA0;
  --gdim:rgba(26,122,74,0.22);
  --dark:#07100B;
  --panel:#112318;
  --radius:1rem;
}
html,body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background:var(--dark);
  overflow-x:hidden;
  scroll-behavior:smooth;
  color:#fff;
}

/* ── VIDEO BG & EFFECTS ── */
.vbg{position:fixed;inset:0;z-index:0}
.vbg video{width:100%;height:100%;object-fit:cover}
.vbg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(7,16,11,0.92) 0%,rgba(7,16,11,0.7) 50%,rgba(7,16,11,0.85) 100%);
}
.glow-left{
  position:fixed;top:40%;left:20%;transform:translate(-50%,-50%);z-index:1;
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,rgba(26,122,74,0.25) 0%,transparent 65%);
  pointer-events:none;
}
.grid-bg {
  position: absolute; inset: 0; z-index: 1; opacity: 0.15; pointer-events: none;
  background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── LIQUID GLASS ── */
.lg{
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 1px 1px rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.2);
  position:relative;overflow:hidden;
}
.lgs{
  background:rgba(20,60,35,0.25);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border: 1px solid rgba(110,207,160,0.15);
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 1px rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.lgs::before {
  content:'';position:absolute;inset:0;z-index:-1;
  background: linear-gradient(180deg, rgba(110,207,160,0.05) 0%, transparent 100%);
}

/* ── ANIMATIONS ── */
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(110,207,160,0.2); } 50% { box-shadow: 0 0 30px rgba(110,207,160,0.5); } }
.stagger-1 { animation: slideUp 0.6s ease-out 0.1s both; }
.stagger-2 { animation: slideUp 0.6s ease-out 0.2s both; }
.stagger-3 { animation: slideUp 0.6s ease-out 0.3s both; }

/* ── LAYOUT ── */
.hero-wrapper { position:relative; min-height:100vh; display:flex; flex-direction:column; padding-bottom: 20px;}
.layout { position:relative; z-index:10; display:flex; flex:1; max-width:1600px; margin:0 auto; width:100%; align-items: stretch; }
.left { width:52%; display:flex; flex-direction:column; padding:20px; }
.right { width:48%; display:flex; flex-direction:column; padding:20px 24px 20px 4px; gap:14px; }

/* ── LEFT INNER PANEL ── */
.left-inner{
  border-radius:32px; display:flex; flex-direction:column; padding:24px 32px 30px; flex:1; justify-content: space-between;
}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-wm{font-size:22px;font-weight:600;color:#fff;letter-spacing:-0.05em}
.nav-pill{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:99px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.nav-pill:hover{background:rgba(255,255,255,0.1); transform:translateY(-2px);}
.nav-right-group{display:flex;align-items:center;gap:10px}
.ib{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.7);transition:all 0.2s}
.ib:hover{background:rgba(255,255,255,0.1);color:#fff; transform:scale(1.05);}

/* HERO CENTER */
.hero-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px;padding:40px 0}
.logomark-lg{width:88px;height:88px;border-radius:24px;display:flex;align-items:center;justify-content:center; margin-bottom: 8px;}
h1{font-size:clamp(44px,4.5vw,72px);font-weight:500;line-height:1.05;letter-spacing:-0.04em;color:#fff}
h1 .serif{font-family:'Source Serif 4',serif;font-style:italic;font-weight:400;color:var(--gl)}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.65);max-width:480px;line-height:1.7}

/* CTAs */
.cta-row{display:flex;align-items:center;gap:12px; margin-top: 8px;}
.cta-main{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 26px;border-radius:99px; border:none; outline:none;
  color:#fff;font-size:15px;font-weight:500;font-family:'Poppins',sans-serif;
  cursor:pointer;transition:all 0.2s;
  background:var(--g);
  box-shadow:inset 0 1px 1px rgba(255,255,255,0.3),0 4px 20px rgba(26,122,74,0.4);
  animation: pulseGlow 3s infinite;
}
.cta-main:hover{background:#1e8c55; transform:translateY(-2px); box-shadow:inset 0 1px 1px rgba(255,255,255,0.3),0 6px 25px rgba(26,122,74,0.5);}
.cta-main:active{transform:translateY(0);}
.cta-ghost{
  display:inline-flex;align-items:center;gap:8px; border:1px solid rgba(255,255,255,0.15); outline:none; background:rgba(255,255,255,0.03);
  padding:14px 24px;border-radius:99px;
  color:rgba(255,255,255,0.9);font-size:15px;font-weight:500;font-family:'Poppins',sans-serif;
  cursor:pointer;transition:all 0.2s;
}
.cta-ghost:hover{background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.3); transform:translateY(-2px);}
.cta-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* pills */
.pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center; margin-top: 10px;}
.pill{
  display:flex; align-items:center; gap:8px;
  padding:8px 16px;border-radius:99px;font-size:12px;font-weight:500;
  color:rgba(255,255,255,0.85);cursor:pointer;transition:all 0.2s;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
}
.pill:hover{background:rgba(255,255,255,0.1); transform:translateY(-2px); border-color:var(--gl);}
.pill img { width: 18px; height: 13px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 2px rgba(0,0,0,0.5); }

/* bottom quote */
.bq{text-align:center;flex-shrink:0; padding-top: 20px;}
.bq-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:12px; font-weight: 500;}
.bq-text{font-size:15px;color:rgba(255,255,255,0.75);margin-bottom:12px;line-height:1.5}
.bq-text em{font-family:'Source Serif 4',serif;font-style:italic;color:var(--gl)}
.bq-author{display:flex;align-items:center;justify-content:center;gap:14px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4); font-weight:500;}
.bq-author span{flex:1;height:1px;background:rgba(255,255,255,0.15);max-width:60px}

/* ── RIGHT PANEL ── */
.r-top{display:flex;align-items:flex-start;justify-content:space-between; margin-bottom:4px;}
.social-pill{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:99px;cursor:pointer;transition:all 0.2s}
.social-pill:hover{background:rgba(255,255,255,0.1);}
.icon-link{color:rgba(255,255,255,0.6);transition:color 0.2s;display:flex;align-items:center;}
.icon-link:hover{color:#fff}
.r-top-right{display:flex;gap:10px}

.r-mid{display:flex;gap:14px}
.community-card{flex:1;padding:18px 20px;border-radius:20px; display:flex; flex-direction:column; justify-content:center;}
.cc-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:6px}
.cc-desc{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5}
.rec-card{padding:18px 20px;border-radius:20px;display:flex;flex-direction:column;gap:12px;min-width:0; background:rgba(20,60,35,0.4); border:1px solid rgba(110,207,160,0.2);}
.rec-head{display:flex;align-items:center;gap:8px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:rd 1.2s ease-in-out infinite; box-shadow:0 0 8px #ef4444;}
@keyframes rd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
.rec-label{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.rec-course{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;}
.waveform{display:flex;align-items:center;gap:3px;height:24px}
.wbar{width:3px;border-radius:2px;background:var(--gl);animation:wv 1.3s ease-in-out infinite}
@keyframes wv{0%,100%{transform:scaleY(0.2)}50%{transform:scaleY(1)}}
.rec-langs{font-size:11px;color:rgba(255,255,255,0.5)}

.outputs-row{display:grid; grid-template-columns: repeat(4, 1fr); gap:12px}
.out-card{border-radius:20px;padding:16px 14px;display:flex;flex-direction:column;gap:10px; transition:transform 0.2s;}
.out-card:hover { transform: translateY(-3px); border-color: rgba(110,207,160,0.3); }
.out-icon{width:34px;height:34px;border-radius:10px;background:rgba(110,207,160,0.1); border:1px solid rgba(110,207,160,0.2);display:flex;align-items:center;justify-content:center}
.out-title{font-size:13px;font-weight:500;color:#fff}
.out-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5}

.feat-panel{border-radius:32px;padding:16px;display:flex;flex-direction:column;gap:12px; margin-top:auto}
.feat-cards{display:flex;gap:12px}
.feat-card{flex:1;border-radius:24px;padding:18px; display:flex; flex-direction:column;}
.fc-icon{width:32px;height:32px;border-radius:10px;background:rgba(110,207,160,0.1); border:1px solid rgba(110,207,160,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.fc-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px}
.fc-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5}
.feat-bottom{border-radius:20px;padding:14px 16px;display:flex;align-items:center;gap:16px; transition:all 0.2s; cursor:pointer;}
.feat-bottom:hover { background:rgba(255,255,255,0.06); }
.feat-thumb{width:86px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0;background:rgba(26,122,74,0.15); border:1px solid rgba(110,207,160,0.2);display:flex;align-items:center;justify-content:center}
.feat-text{flex:1;min-width:0}
.ft-title{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px}
.ft-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5}
.feat-plus{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:18px;font-weight:300;transition:all 0.2s}
.feat-bottom:hover .feat-plus{transform:scale(1.1) rotate(90deg); background:var(--g);}

/* FLIP CARD */
.flip{perspective:600px;width:100%;height:100%;cursor:pointer}
.flip-in{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)}
.flip:hover .flip-in{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:8px;border-radius:12px;font-size:10px;text-align:center;color:rgba(255,255,255,0.8)}
